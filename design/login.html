<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Giriş Ekranı - IPTV Player</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ea2a33",
                        "primary-dark": "#c21e26",
                        "background-light": "#f8f6f6",
                        "background-dark": "#161616", // Slightly darker than config for deeper contrast
                        "surface-dark": "#211111",
                        "input-bg": "#2a1819",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(234, 42, 51, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #161616;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Focus styles for keyboard navigation */
        :focus-visible {
            outline: 2px solid #ea2a33;
            outline-offset: 2px;
        }
        
        .form-input:focus {
            box-shadow: 0 0 0 1px #ea2a33;
        }
    </style>
</head>
<body class="bg-background-dark text-white font-display antialiased min-h-screen flex flex-col overflow-hidden relative selection:bg-primary selection:text-white">
<!-- Ambient Background Effect -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[100px] rounded-full"></div>
<!-- Background Texture Image -->
<div class="absolute inset-0 opacity-20 bg-repeat bg-center mix-blend-overlay" data-alt="Subtle noise texture pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAyQlto8xfJbvkxWzULyLrrnRsXxlvH0-9PniHYixeOcIXh18FEO926MtYHfDPBWOEAXThe3styswmqgZ4eqk32fU6n9g-pKD8GMsqismV5ylqHKf3FQdNPy7t7_X1CraK1wWuzkp3Ba0XJl4N5tkFt-No-p9ZOSXJFNB2jchDJLwua9YiVLswxuFAcfruD2ulRbLkC1QgGg_DtqiWIiO1CzcgTYdWPHFcJqFacnUbpndSbyw4lNOi_RCceyrKgZMZzIgDu50ZCKXs');"></div>
</div>
<!-- Main Layout -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center p-4 sm:p-8">
<div class="w-full max-w-[440px] flex flex-col gap-8 animate-fade-in-up">
<!-- Logo / Header Section -->
<div class="flex flex-col items-center justify-center text-center space-y-4">
<div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-glow mb-2">
<span class="material-symbols-outlined text-white text-4xl">live_tv</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white">IPTV Player</h1>
<p class="text-gray-400 text-sm font-medium">Hesabınıza giriş yaparak yayınların keyfini çıkarın</p>
</div>
<!-- Login Card -->
<div class="bg-surface-dark/80 backdrop-blur-xl border border-white/5 rounded-2xl p-6 sm:p-8 shadow-2xl flex flex-col gap-6">
<h2 class="text-xl font-bold text-white text-center mb-2">Giriş Yap</h2>
<!-- Username Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-300 ml-1" for="username">Kullanıcı Adı veya E-posta</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-gray-500 group-focus-within:text-primary transition-colors">person</span>
<input class="form-input w-full bg-input-bg border border-[#3d2526] text-white text-base rounded-xl py-3.5 pl-12 pr-4 focus:border-primary focus:ring-0 placeholder:text-gray-600 transition-all shadow-sm hover:border-white/10" id="username" name="username" placeholder="kullanici@ornek.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-gray-300" for="password">Şifre</label>
</div>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-gray-500 group-focus-within:text-primary transition-colors">lock</span>
<input class="form-input w-full bg-input-bg border border-[#3d2526] text-white text-base rounded-xl py-3.5 pl-12 pr-12 focus:border-primary focus:ring-0 placeholder:text-gray-600 transition-all shadow-sm hover:border-white/10" id="password" name="password" placeholder="••••••••" type="password"/>
<button aria-label="Şifreyi göster" class="absolute right-0 top-0 bottom-0 px-4 text-gray-500 hover:text-white focus:text-white transition-colors flex items-center justify-center rounded-r-xl focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="form-checkbox w-4 h-4 rounded border-gray-600 bg-input-bg text-primary focus:ring-primary focus:ring-offset-0 focus:ring-offset-transparent transition-all" type="checkbox"/>
<span class="text-gray-400 group-hover:text-gray-300 transition-colors">Beni Hatırla</span>
</label>
<a class="text-primary hover:text-red-400 font-medium transition-colors hover:underline decoration-primary/50 underline-offset-4 rounded focus:outline-none focus:ring-2 focus:ring-primary" href="#">
                        Şifremi unuttum?
                    </a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-dark text-white font-bold text-lg py-3.5 px-6 rounded-xl shadow-lg shadow-primary/20 transform transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface-dark focus:ring-primary flex items-center justify-center gap-2 mt-2">
<span>Giriş Yap</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</div>
<!-- Footer Links -->
<div class="text-center">
<p class="text-gray-400 text-sm">
                    Hesabınız yok mu? 
                    <a class="text-white font-semibold hover:text-primary transition-colors ml-1 inline-flex items-center gap-1 focus:outline-none focus:underline rounded px-1" href="#">
                        Kayıt Ol <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</a>
</p>
</div>
<!-- App Version / Info -->
<div class="text-center mt-auto">
<p class="text-xs text-gray-600 font-mono">v2.4.0 • Build 20231024</p>
</div>
</div>
</main>
</body></html>
